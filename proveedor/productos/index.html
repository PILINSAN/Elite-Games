<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Games — Mis productos (Proveedor)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">ELITE<span>GAMES</span></div>
    <div>
      <div class="nav-group-label">Proveedor</div>
      <ul class="nav-list">
        <li><a href="../dashboard/index.html">📊 Dashboard</a></li>
        <li><a href="../productos/index.html" class="active">🎮 Mis productos</a></li>
        <li><a href="../inventario/index.html">📦 Inventario</a></li>
        <li><a href="../pedidos/index.html">🚚 Pedidos recibidos</a></li>
        <li><a href="../perfil/index.html">🏢 Perfil de empresa</a></li>
      </ul>
    </div>
    <div class="sidebar-foot">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Catálogo propio</div>
        <h1>Mis productos</h1>
        <p>Publica y administra los juegos que vendes en Elite Games.</p>
      </div>
      <button class="btn btn-primary" id="btn-new">+ Publicar producto</button>
    </div>
    <div class="xp-bar"><i style="width:70%"></i></div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="products-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Publicar producto</h3>
    <form id="product-form">
      <input type="hidden" id="p-id">
      <div class="field"><label for="p-nombre">Nombre</label><input type="text" id="p-nombre" required></div>
      <div class="row-2">
        <div class="field"><label for="p-categoria">Categoría</label><input type="text" id="p-categoria" required></div>
        <div class="field"><label for="p-precio">Precio (COP)</label><input type="number" id="p-precio" min="0" required></div>
      </div>
      <div class="field"><label for="p-stock">Stock</label><input type="number" id="p-stock" min="0" required></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="btn-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script src="../../shared/js/data.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="script.js"></script>
</body>
</html>
