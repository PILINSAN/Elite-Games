<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Games — Carrito</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">ELITE<span>GAMES</span></div>
    <div>
      <div class="nav-group-label">Mi cuenta</div>
      <ul class="nav-list">
        <li><a href="../catalogo/index.html"> Catálogo</a></li>
        <li><a href="../carrito/index.html" class="active"> Carrito</a></li>
        <li><a href="../pedidos/index.html"> Mis pedidos</a></li>
        <li><a href="../favoritos/index.html"> Favoritos</a></li>
        <li><a href="../perfil/index.html"> Perfil</a></li>
      </ul>
    </div>
    <div class="sidebar-foot">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Compra</div>
        <h1>Tu carrito</h1>
        <p>Revisa tus juegos antes de confirmar el pedido.</p>
      </div>
    </div>
    <div class="xp-bar"><i style="width:35%"></i></div>

    <div class="grid cols-2">
      <div class="panel">
        <h2>Productos en el carrito</h2>
        <div id="cart-list"></div>
      </div>
      <div class="panel">
        <h2>Resumen</h2>
        <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal">$0</span></div>
        <div class="summary-row"><span>Envío</span><span id="sum-envio">$0</span></div>
        <div class="summary-row total"><span>Total</span><span id="sum-total">$0</span></div>
        <button class="btn btn-primary" id="btn-checkout" style="width:100%; justify-content:center; margin-top:16px;">Confirmar pedido</button>
      </div>
    </div>
  </main>
</div>

<script src="../../shared/js/data.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="script.js"></script>
</body>
</html>
