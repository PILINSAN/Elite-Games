<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Games — Mi perfil</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">ELITE<span>GAMES</span></div>
    <div>
      <div class="nav-group-label">Mi cuenta</div>
      <ul class="nav-list">
        <li><a href="../catalogo/index.html"> Catálogo</a></li>
        <li><a href="../carrito/index.html"> Carrito</a></li>
        <li><a href="../pedidos/index.html"> Mis pedidos</a></li>
        <li><a href="../favoritos/index.html"> Favoritos</a></li>
        <li><a href="../perfil/index.html" class="active"> Perfil</a></li>
      </ul>
    </div>
    <div class="sidebar-foot">
      <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Cuenta</div>
        <h1>Mi perfil</h1>
        <p>Actualiza tus datos personales.</p>
      </div>
    </div>
    <div class="xp-bar"><i style="width:35%"></i></div>

    <div class="panel" style="max-width:480px;">
      <div class="profile-head">
        <div class="avatar-lg" id="avatar-lg">U</div>
        <div>
          <div style="font-weight:700; font-size:16px;" id="display-name">Usuario</div>
          <div style="color:var(--muted); font-size:13px;">Rango: USUARIO · LV.1</div>
        </div>
      </div>

      <form id="profile-form">
        <div class="field"><label for="nombre">Nombre completo</label><input type="text" id="nombre" required></div>
        <div class="field"><label for="email">Correo electrónico</label><input type="email" id="email" required></div>
        <div class="field"><label for="password">Contraseña</label><input type="text" id="password" required></div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <div class="save-note" id="save-note">✓ Cambios guardados correctamente</div>
      </form>
    </div>
  </main>
</div>

<script src="../../shared/js/data.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="script.js"></script>
</body>
</html>
